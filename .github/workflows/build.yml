name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Configure
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build
        run: cmake --build build --config Release

      - name: Show files
        run: cmd /c dir build /s

      - name: Package
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force dist
      
          Copy-Item build\bin\NormalToHeight.exe dist\
      
          Get-ChildItem -Recurse build -Filter *.dll |
            Copy-Item -Destination dist
      
      - uses: actions/upload-artifact@v4
        with:
          name: NormalToHeight-windows
          path: dist
