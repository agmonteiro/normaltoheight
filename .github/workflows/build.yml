name: Build

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake -G "Visual Studio 17 2022" -A x64 ..

      - name: Build
        run: |
          cd build
          cmake --build . --config Release

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: NormalToHeight
          path: build/**/*.exe
